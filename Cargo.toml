[package]
name = "rs-plugkit"
version = "0.1.362"
edition = "2021"

[lib]
name = "rs_plugkit"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[features]
default = []
wasm = []

[dependencies]
rs-codeinsight = { git = "https://github.com/AnEntrypoint/rs-codeinsight", branch = "main", features = ["all-languages"] }
anyhow = "1"
serde_json = "1"
serde = { version = "1", features = ["derive"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rs-exec = { git = "https://github.com/AnEntrypoint/rs-exec", branch = "main" }
rs-search = { git = "https://github.com/AnEntrypoint/rs-search", branch = "main", default-features = false, features = ["perf"] }
rs-learn = { git = "https://github.com/AnEntrypoint/rs-learn", branch = "main", default-features = false }
libsql = { version = "0.9", default-features = false, features = ["core", "serde"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
sysinfo = "0.33"
which = "7"

[target.'cfg(target_arch = "wasm32")'.dependencies]
rs-exec = { git = "https://github.com/AnEntrypoint/rs-exec", branch = "main", default-features = false, features = ["wasm"] }
rs-search = { git = "https://github.com/AnEntrypoint/rs-search", branch = "main", default-features = false, features = ["wasm"] }
rs-learn = { git = "https://github.com/AnEntrypoint/rs-learn", branch = "main", default-features = false, features = ["wasm"] }

[[bin]]
name = "plugkit"
path = "src/main.rs"


[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "z"
panic = "abort"
