[package]
name = "rs-plugkit"
version = "0.1.144"
edition = "2021"

[lib]
name = "rs_plugkit"
path = "src/lib.rs"

[dependencies]
rs-exec = { git = "https://github.com/AnEntrypoint/rs-exec", branch = "main" }
rs-codeinsight = { git = "https://github.com/AnEntrypoint/rs-codeinsight", branch = "main" }
rs-search = { git = "https://github.com/AnEntrypoint/rs-search", branch = "main" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
clap = { version = "4", features = ["derive"] }
sysinfo = "0.33"

[[bin]]
name = "plugkit"
path = "src/main.rs"


[profile.release]
strip = true
