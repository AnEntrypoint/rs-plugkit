name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Update git deps
        run: |
          cargo update -p rs-learn || true
          cargo update -p rs-search || true
          cargo update -p rs-codeinsight || true
          cargo update -p rs-exec || true
          cargo update

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugkit-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/plugkit
            target/${{ matrix.target }}/release/plugkit.exe
          if-no-files-found: ignore
