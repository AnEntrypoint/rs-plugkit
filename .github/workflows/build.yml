name: Build

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repo that triggered cascade (informational)'
        required: false
        default: ''
      upstream_sha:
        description: 'Upstream commit SHA (informational)'
        required: false
        default: ''

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-wasm32-unknown-unknown
          cache-on-failure: true

      - name: Wipe cargo git cache and lockfile (force fresh dep resolution)
        shell: bash
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown --no-default-features --features wasm --lib

      - name: Verify WASM artifact
        shell: bash
        run: |
          ls -la target/wasm32-unknown-unknown/release/rs_plugkit.wasm
          [ -s target/wasm32-unknown-unknown/release/rs_plugkit.wasm ] || exit 1
          wasm_file_size=$(stat -c%s target/wasm32-unknown-unknown/release/rs_plugkit.wasm || stat -f%z target/wasm32-unknown-unknown/release/rs_plugkit.wasm)
          echo "WASM artifact size: $wasm_file_size bytes"
