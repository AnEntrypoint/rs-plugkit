name: Build

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repo that triggered cascade (informational)'
        required: false
        default: ''
      upstream_sha:
        description: 'Upstream commit SHA (informational)'
        required: false
        default: ''

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: check-wasm32-wasip1-v2
          cache-on-failure: false

      - name: Cargo check (fast)
        run: cargo check --target wasm32-wasip1 --no-default-features --features wasm --lib

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasi-sdk (clang + sysroot for tree-sitter C grammars via rs-codeinsight)
        run: |
          WASI_VERSION=24
          WASI_VERSION_FULL=${WASI_VERSION}.0
          curl -sL -o wasi-sdk.tar.gz "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz"
          mkdir -p $HOME/wasi-sdk
          tar -xzf wasi-sdk.tar.gz -C $HOME/wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=$HOME/wasi-sdk" >> $GITHUB_ENV
          echo "CC_wasm32_wasip1=$HOME/wasi-sdk/bin/clang" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1=$HOME/wasi-sdk/bin/llvm-ar" >> $GITHUB_ENV
          echo "CFLAGS_wasm32_wasip1=--sysroot=$HOME/wasi-sdk/share/wasi-sysroot -DLONGDOUBLE_TYPE=double -DSQLITE_OMIT_LOAD_EXTENSION -DSQLITE_MAX_MMAP_SIZE=0 -DSQLITE_DEFAULT_MMAP_SIZE=0 -DSQLITE_THREADSAFE=0 -DSQLITE_TEMP_STORE=3 -DHAVE_FDATASYNC=0 -DHAVE_POSIX_FALLOCATE=0 -DHAVE_PREAD=0 -DHAVE_PWRITE=0 -DPROT_READ=1 -DPROT_WRITE=2 -DMAP_SHARED=1 -DMAP_FAILED=((void*)-1) -DMAP_PRIVATE=2 -Wno-error=implicit-function-declaration -Wno-error=int-conversion" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-wasm32-wasip1-v2
          cache-on-failure: false

      - name: Wipe cargo git cache and lockfile (force fresh dep resolution)
        shell: bash
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Fetch embedding weights (MiniLM-L6-v2 safetensors + tokenizer)
        shell: bash
        run: bash scripts/fetch-weights.sh

      - name: Build WASM
        run: cargo build --release --target wasm32-wasip1 --no-default-features --features wasm --lib

      - name: Verify WASM artifact
        shell: bash
        run: |
          ls -la target/wasm32-wasip1/release/rs_plugkit.wasm
          [ -s target/wasm32-wasip1/release/rs_plugkit.wasm ] || exit 1
          wasm_file_size=$(stat -c%s target/wasm32-wasip1/release/rs_plugkit.wasm || stat -f%z target/wasm32-wasip1/release/rs_plugkit.wasm)
          echo "WASM artifact size: $wasm_file_size bytes"

      - name: Upload plugkit.wasm
        uses: actions/upload-artifact@v5
        with:
          name: plugkit-wasm32-wasip1
          path: target/wasm32-wasip1/release/rs_plugkit.wasm
          if-no-files-found: error
