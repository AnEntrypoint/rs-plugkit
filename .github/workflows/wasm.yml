name: Wasm

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Install wasi-sdk (clang + sysroot for tree-sitter C grammars via rs-codeinsight)
        run: |
          WASI_VERSION=24
          WASI_VERSION_FULL=${WASI_VERSION}.0
          curl -sL -o wasi-sdk.tar.gz "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz"
          mkdir -p $HOME/wasi-sdk
          tar -xzf wasi-sdk.tar.gz -C $HOME/wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=$HOME/wasi-sdk" >> $GITHUB_ENV
          echo "CC_wasm32_wasip1=$HOME/wasi-sdk/bin/clang" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1=$HOME/wasi-sdk/bin/llvm-ar" >> $GITHUB_ENV
          echo "CFLAGS_wasm32_wasip1=--sysroot=$HOME/wasi-sdk/share/wasi-sysroot" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1-plugkit

      - name: Wipe cargo git cache and lockfile (force fresh resolution of leaf wasm features)
        shell: bash
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Build rs-plugkit cdylib for wasm32-wasip1
        run: cargo build --release --target wasm32-wasip1 --no-default-features --features wasm --lib

      - name: List wasm artifacts
        run: |
          ls -la target/wasm32-wasip1/release/ || true
          find target/wasm32-wasip1/release -name '*.wasm' -o -name '*.rlib' | head -20

      - name: Upload plugkit.wasm
        uses: actions/upload-artifact@v4
        with:
          name: plugkit-wasm32-wasip1
          path: target/wasm32-wasip1/release/rs_plugkit.wasm
          if-no-files-found: error

      - name: Publish plugkit.wasm to plugkit-bin Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          set -e
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')
          cp target/wasm32-wasip1/release/rs_plugkit.wasm plugkit.wasm
          sha256sum plugkit.wasm | sed 's/ \*/  /' > plugkit.wasm.sha256
          if ! gh release view "v$VER" --repo AnEntrypoint/plugkit-bin >/dev/null 2>&1; then
            gh release create "v$VER" \
              --repo AnEntrypoint/plugkit-bin \
              --title "plugkit v$VER" \
              --notes "Auto-published by rs-plugkit Wasm CI from $GITHUB_SHA"
          fi
          gh release upload "v$VER" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            plugkit.wasm \
            plugkit.wasm.sha256
