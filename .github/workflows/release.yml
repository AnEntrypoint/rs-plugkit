name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: plugkit-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: plugkit-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: plugkit-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: plugkit-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: plugkit-win32-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: plugkit-win32-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Wipe cargo git cache and lockfile (force fresh dep resolution)
        shell: bash
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/plugkit${ext}" "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish-binaries:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rs-plugkit for version
        uses: actions/checkout@v4
        with:
          path: rs-plugkit-src
          token: ${{ secrets.PUBLISHER_TOKEN }}
          fetch-depth: 0

      - name: Auto-bump rs-plugkit patch version
        id: bump
        shell: bash
        working-directory: rs-plugkit-src
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config user.name "gm-bot"
          git config user.email "noreply@github.com"
          git config url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" Cargo.toml
          node -e "
            const fs = require('fs');
            let lock = fs.readFileSync('Cargo.lock', 'utf8');
            lock = lock.replace('name = \"rs-plugkit\"\nversion = \"$CURRENT\"', 'name = \"rs-plugkit\"\nversion = \"$NEW_VERSION\"');
            fs.writeFileSync('Cargo.lock', lock);
          "
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No version change needed"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            git fetch origin main
            git rebase -s recursive -X theirs origin/main
            git push origin HEAD:main
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bins/

      - name: Stage release assets
        id: stage
        shell: bash
        env:
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          mkdir -p release-assets
          cp bins/plugkit-win32-x64.exe/plugkit-win32-x64.exe     release-assets/
          cp bins/plugkit-win32-arm64.exe/plugkit-win32-arm64.exe release-assets/
          cp bins/plugkit-darwin-x64/plugkit-darwin-x64           release-assets/
          cp bins/plugkit-darwin-arm64/plugkit-darwin-arm64       release-assets/
          cp bins/plugkit-linux-x64/plugkit-linux-x64             release-assets/
          cp bins/plugkit-linux-arm64/plugkit-linux-arm64         release-assets/
          chmod +x release-assets/plugkit-darwin-* release-assets/plugkit-linux-* || true
          cd release-assets
          # Portable sha256 manifest: "<hex>  <filename>" (no leading * for binary mode)
          sha256sum plugkit-win32-x64.exe plugkit-win32-arm64.exe \
                    plugkit-darwin-x64 plugkit-darwin-arm64 \
                    plugkit-linux-x64 plugkit-linux-arm64 \
            | sed 's/ \*/  /' > plugkit.sha256
          echo "$VER" > plugkit.version
          ls -la
          cat plugkit.sha256

      - name: Upload to plugkit-bin Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          if ! gh release view "v$VER" --repo AnEntrypoint/plugkit-bin >/dev/null 2>&1; then
            gh release create "v$VER" \
              --repo AnEntrypoint/plugkit-bin \
              --title "plugkit v$VER" \
              --notes "Auto-published by rs-plugkit CI from $GITHUB_SHA"
          fi
          gh release upload "v$VER" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            release-assets/plugkit-win32-x64.exe \
            release-assets/plugkit-win32-arm64.exe \
            release-assets/plugkit-darwin-x64 \
            release-assets/plugkit-darwin-arm64 \
            release-assets/plugkit-linux-x64 \
            release-assets/plugkit-linux-arm64 \
            release-assets/plugkit.sha256 \
            release-assets/plugkit.version

      - name: Bump gm-starter metadata
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          git config --global user.name "rs-plugkit-bot"
          git config --global user.email "noreply@github.com"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AnEntrypoint/gm.git" gm-src
          cd gm-src
          CURR=$(jq -r '.plugkitVersion' gm-starter/gm.json)
          if [ "$CURR" = "$VER" ]; then
            echo "plugkitVersion already at $VER, no metadata bump needed"
            exit 0
          fi
          jq --arg v "$VER" '.plugkitVersion = $v' gm-starter/gm.json > /tmp/gm.json
          mv /tmp/gm.json gm-starter/gm.json
          echo "$VER" > gm-starter/bin/plugkit.version
          # Sync sha256 manifest from the just-uploaded release
          cp ../release-assets/plugkit.sha256 gm-starter/bin/plugkit.sha256 2>/dev/null || \
            curl -sL "https://github.com/AnEntrypoint/plugkit-bin/releases/download/v${VER}/plugkit.sha256" -o gm-starter/bin/plugkit.sha256
          git add gm-starter/gm.json gm-starter/bin/plugkit.version gm-starter/bin/plugkit.sha256
          if git diff --cached --quiet; then
            echo "No metadata changes"
            exit 0
          fi
          git commit -m "chore: bump plugkitVersion to $VER [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed metadata bump on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing"
            git pull --rebase origin main || true
          done
          echo "All push attempts exhausted" >&2
          exit 1
