name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          key: release-wasm32-unknown-unknown
          cache-on-failure: true

      - name: Wipe cargo git cache and lockfile (force fresh dep resolution)
        shell: bash
        continue-on-error: true
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown --features wasm

      - name: Rename WASM binary
        shell: bash
        run: |
          cp "target/wasm32-unknown-unknown/release/rs_plugkit.wasm" "plugkit.wasm"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugkit.wasm
          path: plugkit.wasm

  publish-binaries:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rs-plugkit for version
        uses: actions/checkout@v4
        with:
          path: rs-plugkit-src
          token: ${{ secrets.PUBLISHER_TOKEN }}
          fetch-depth: 0

      - name: Auto-bump rs-plugkit patch version
        id: bump
        shell: bash
        working-directory: rs-plugkit-src
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config user.name "gm-bot"
          git config user.email "noreply@github.com"
          git config url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" Cargo.toml
          node -e "
            const fs = require('fs');
            let lock = fs.readFileSync('Cargo.lock', 'utf8');
            lock = lock.replace('name = \"rs-plugkit\"\nversion = \"$CURRENT\"', 'name = \"rs-plugkit\"\nversion = \"$NEW_VERSION\"');
            fs.writeFileSync('Cargo.lock', lock);
          "
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No version change needed"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            git fetch origin main
            git rebase -s recursive -X theirs origin/main
            git push origin HEAD:main
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          path: bins/

      - name: Stage release assets
        id: stage
        shell: bash
        env:
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          mkdir -p release-assets
          cp bins/plugkit.wasm/plugkit.wasm release-assets/
          cd release-assets
          sha256sum plugkit.wasm | sed 's/ \*/  /' > plugkit.wasm.sha256
          echo "$VER" > plugkit.wasm.version
          ls -la
          cat plugkit.wasm.sha256

      - name: Upload to plugkit-bin Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          if ! gh release view "v$VER" --repo AnEntrypoint/plugkit-bin >/dev/null 2>&1; then
            gh release create "v$VER" \
              --repo AnEntrypoint/plugkit-bin \
              --title "plugkit v$VER (WASM)" \
              --notes "Auto-published WASM-only build from rs-plugkit CI at $GITHUB_SHA"
          fi
          gh release upload "v$VER" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            release-assets/plugkit.wasm \
            release-assets/plugkit.wasm.sha256 \
            release-assets/plugkit.wasm.version

      - name: Bump gm-starter metadata
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          git config --global user.name "rs-plugkit-bot"
          git config --global user.email "noreply@github.com"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AnEntrypoint/gm.git" gm-src
          cd gm-src
          jq --arg v "$VER" '.plugkitVersion = $v' gm-starter/gm.json > /tmp/gm.json
          mv /tmp/gm.json gm-starter/gm.json
          echo "$VER" > gm-starter/bin/plugkit.version
          cp ../release-assets/plugkit.wasm.sha256 gm-starter/bin/plugkit.wasm.sha256 2>/dev/null || \
            curl -sL "https://github.com/AnEntrypoint/plugkit-bin/releases/download/v${VER}/plugkit.wasm.sha256" -o gm-starter/bin/plugkit.wasm.sha256
          git add gm-starter/gm.json gm-starter/bin/plugkit.version gm-starter/bin/plugkit.wasm.sha256
          if git diff --cached --quiet; then
            echo "No metadata changes"
            exit 0
          fi
          git commit -m "chore: bump plugkitVersion to $VER (WASM)"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed metadata bump on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing"
            git pull --rebase origin main || true
          done
          echo "All push attempts exhausted" >&2
          exit 1
