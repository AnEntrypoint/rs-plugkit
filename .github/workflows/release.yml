name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout rs-plugkit
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PUBLISHER_TOKEN }}
          fetch-depth: 0

      - name: Auto-bump rs-plugkit patch version BEFORE build
        id: bump
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config user.name "gm-bot"
          git config user.email "noreply@github.com"
          git config url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" Cargo.toml
          git add Cargo.toml
          if git diff --cached --quiet; then
            echo "No version change needed"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            git fetch origin main
            git rebase -s recursive -X theirs origin/main
            git push origin HEAD:main
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: bump
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasi-sdk (clang + sysroot for tree-sitter C grammars)
        run: |
          WASI_VERSION=24
          WASI_VERSION_FULL=${WASI_VERSION}.0
          curl -sL -o wasi-sdk.tar.gz "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz"
          mkdir -p $HOME/wasi-sdk
          tar -xzf wasi-sdk.tar.gz -C $HOME/wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=$HOME/wasi-sdk" >> $GITHUB_ENV
          echo "CC_wasm32_wasip1=$HOME/wasi-sdk/bin/clang" >> $GITHUB_ENV
          echo "AR_wasm32_wasip1=$HOME/wasi-sdk/bin/llvm-ar" >> $GITHUB_ENV
          echo "CFLAGS_wasm32_wasip1=--sysroot=$HOME/wasi-sdk/share/wasi-sysroot -DLONGDOUBLE_TYPE=double -DSQLITE_OMIT_LOAD_EXTENSION -DSQLITE_MAX_MMAP_SIZE=0 -DSQLITE_DEFAULT_MMAP_SIZE=0 -DSQLITE_THREADSAFE=0 -DSQLITE_TEMP_STORE=3 -DHAVE_FDATASYNC=0 -DHAVE_POSIX_FALLOCATE=0 -DHAVE_PREAD=0 -DHAVE_PWRITE=0 -DPROT_READ=1 -DPROT_WRITE=2 -DMAP_SHARED=1 -DMAP_FAILED=((void*)-1) -DMAP_PRIVATE=2 -Wno-error=implicit-function-declaration -Wno-error=int-conversion" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          key: release-wasm32-wasip1-v2
          cache-on-failure: false

      - name: Wipe cargo git cache and lockfile (force fresh dep resolution)
        shell: bash
        continue-on-error: true
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Fetch embedding weights (BGE-small-en-v1.5 F32 safetensors + tokenizer)
        shell: bash
        run: bash scripts/fetch-weights.sh

      - name: Force fresh compile of the rs-plugkit crate (defeat stale-cache artifact)
        shell: bash
        run: |
          # rust-cache restores target/ under a constant key, which can carry a stale
          # rs_plugkit.wasm and incremental fingerprints. If cargo judges the crate
          # unchanged after restore, it skips recompiling and the next step cp's the
          # cached (stale) wasm — so a pushed source change is absent from the published
          # artifact despite green CI. Remove the cached output wasm and force the top
          # crate to rebuild so the artifact always reflects this commit's source.
          rm -f target/wasm32-wasip1/release/rs_plugkit.wasm || true
          cargo clean --release --target wasm32-wasip1 -p rs-plugkit || true

      - name: Build WASM
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --target wasm32-wasip1 --no-default-features --features wasm --lib 2>&1 | tee /tmp/wasm-build.log || {
            echo "::group::rustc errors"
            grep -E '^error|error\[E[0-9]+\]' /tmp/wasm-build.log | grep -vE 'cargo:warning' | head -40
            echo "::endgroup::"
            grep -E '^error|error\[E[0-9]+\]' /tmp/wasm-build.log | grep -vE 'cargo:warning' | head -10 | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          }

      - name: Verify WASM was produced fresh this run
        shell: bash
        run: |
          test -f "target/wasm32-wasip1/release/rs_plugkit.wasm" || { echo "rs_plugkit.wasm not built"; exit 1; }

      - name: Rename WASM binary
        shell: bash
        run: |
          cp "target/wasm32-wasip1/release/rs_plugkit.wasm" "plugkit.wasm"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v5
        with:
          name: plugkit.wasm
          path: plugkit.wasm

  publish-binaries:
    needs: [bump, build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v5
        with:
          name: plugkit.wasm
          path: bins/

      - name: Stage release assets
        id: stage
        shell: bash
        env:
          VER: ${{ needs.bump.outputs.version }}
        run: |
          set -e
          mkdir -p release-assets
          cp bins/plugkit.wasm release-assets/
          cd release-assets
          sha256sum plugkit.wasm | sed 's/ \*/  /' > plugkit.wasm.sha256
          echo "$VER" > plugkit.wasm.version
          ls -la
          cat plugkit.wasm.sha256

      - name: Upload to plugkit-bin Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ needs.bump.outputs.version }}
        run: |
          set -e
          if ! gh release view "v$VER" --repo AnEntrypoint/plugkit-bin >/dev/null 2>&1; then
            gh release create "v$VER" \
              --repo AnEntrypoint/plugkit-bin \
              --title "plugkit v$VER (WASM)" \
              --notes "Auto-published WASM-only build from rs-plugkit CI at $GITHUB_SHA"
          fi
          gh release upload "v$VER" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            release-assets/plugkit.wasm \
            release-assets/plugkit.wasm.sha256 \
            release-assets/plugkit.wasm.version

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Create npm package structure
        env:
          VER: ${{ needs.bump.outputs.version }}
        run: |
          set -e
          mkdir -p npm-pkg
          cat > npm-pkg/package.json <<'EOF'
          {
            "name": "plugkit-wasm",
            "version": "VERSION_PLACEHOLDER",
            "description": "WASM distribution of plugkit - CLI entry point and spool dispatcher for gm",
            "main": "plugkit.wasm",
            "types": "plugkit.d.ts",
            "repository": {
              "type": "git",
              "url": "https://github.com/AnEntrypoint/rs-plugkit.git"
            },
            "keywords": ["plugkit", "wasm", "gm", "spool", "dispatcher"],
            "author": "AnEntrypoint",
            "license": "MIT",
            "engines": {
              "node": ">=18.0.0"
            }
          }
          EOF
          sed -i "s/VERSION_PLACEHOLDER/$VER/" npm-pkg/package.json
          cp release-assets/plugkit.wasm npm-pkg/
          cp release-assets/plugkit.wasm.sha256 npm-pkg/
          cat > npm-pkg/plugkit.d.ts <<'EOF'
          declare const plugkitWasm: WebAssembly.Module;
          export = plugkitWasm;
          EOF
          ls -la npm-pkg/

      - name: Publish to npm
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VER: ${{ needs.bump.outputs.version }}
        run: |
          set -e
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN not set; skipping npm publish"
            exit 0
          fi
          cd npm-pkg
          if npm view "plugkit-wasm@$VER" version >/dev/null 2>&1; then
            echo "plugkit-wasm@$VER already published; skipping"
            exit 0
          fi
          if npm publish --access public 2>npm-publish-err.log; then
            echo "plugkit-wasm@$VER published to npm"
          else
            ERR=$(cat npm-publish-err.log | tr '\n' ' ' | head -c 400)
            echo "::warning title=npm publish failed for plugkit-wasm@$VER::$ERR"
            echo "npm publish failed; gh-releases path remains canonical, cascade continues"
            cat npm-publish-err.log
          fi

      - name: Bump gm metadata
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ needs.bump.outputs.version }}
        run: |
          set -e
          git config --global user.name "rs-plugkit-bot"
          git config --global user.email "noreply@github.com"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AnEntrypoint/gm.git" gm-src
          cd gm-src
          jq --arg v "$VER" '.plugkitVersion = $v' gm.json > /tmp/gm.json
          mv /tmp/gm.json gm.json
          echo "$VER" > bin/plugkit.version
          cp ../release-assets/plugkit.wasm.sha256 bin/plugkit.wasm.sha256 2>/dev/null || \
            curl -sL "https://github.com/AnEntrypoint/plugkit-bin/releases/download/v${VER}/plugkit.wasm.sha256" -o bin/plugkit.wasm.sha256
          git add gm.json bin/plugkit.version bin/plugkit.wasm.sha256
          if git diff --cached --quiet; then
            echo "No metadata changes"
            exit 0
          fi
          git commit -m "chore: bump plugkitVersion to $VER (WASM)"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed metadata bump on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing"
            git pull --rebase origin main || true
          done
          echo "All push attempts exhausted" >&2
          exit 1
