name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: plugkit-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: plugkit-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: plugkit-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: plugkit-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: plugkit-win32-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: plugkit-win32-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Wipe cargo git cache and lockfile (force fresh dep resolution)
        shell: bash
        run: |
          rm -rf ~/.cargo/git/db ~/.cargo/git/checkouts || true
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build rtk from source (same toolchain, all targets including win-arm64)
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -e
          # Pin to a known-good rtk tag so we don't drift unexpectedly on cargo install --git
          RTK_REF="${RTK_REF:-master}"
          mkdir -p rtk-build
          cargo install \
            --git https://github.com/rtk-ai/rtk \
            --branch "$RTK_REF" \
            --target ${{ matrix.target }} \
            --root rtk-build \
            --locked || \
          cargo install \
            --git https://github.com/rtk-ai/rtk \
            --branch "$RTK_REF" \
            --target ${{ matrix.target }} \
            --root rtk-build
          ls rtk-build/bin/

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Rename binaries (plugkit + rtk)
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/plugkit${ext}" "${{ matrix.asset_name }}"
          # rtk asset uses the same naming convention with rtk- prefix
          rtk_asset="$(echo '${{ matrix.asset_name }}' | sed 's/^plugkit-/rtk-/')"
          cp "rtk-build/bin/rtk${ext}" "$rtk_asset"
          echo "rtk_asset=$rtk_asset" >> "$GITHUB_ENV"

      - name: Upload plugkit build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Upload rtk build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.rtk_asset }}
          path: ${{ env.rtk_asset }}

  publish-binaries:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rs-plugkit for version
        uses: actions/checkout@v4
        with:
          path: rs-plugkit-src
          token: ${{ secrets.PUBLISHER_TOKEN }}
          fetch-depth: 0

      - name: Auto-bump rs-plugkit patch version
        id: bump
        shell: bash
        working-directory: rs-plugkit-src
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config user.name "gm-bot"
          git config user.email "noreply@github.com"
          git config url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" Cargo.toml
          node -e "
            const fs = require('fs');
            let lock = fs.readFileSync('Cargo.lock', 'utf8');
            lock = lock.replace('name = \"rs-plugkit\"\nversion = \"$CURRENT\"', 'name = \"rs-plugkit\"\nversion = \"$NEW_VERSION\"');
            fs.writeFileSync('Cargo.lock', lock);
          "
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No version change needed"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            git fetch origin main
            git rebase -s recursive -X theirs origin/main
            git push origin HEAD:main
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bins/

      - name: Resolve rtk version from source
        id: rtk
        shell: bash
        run: |
          set -e
          # rtk version comes from the source we just built (Cargo.toml of rtk-ai/rtk@master)
          ver=$(curl -sL https://raw.githubusercontent.com/rtk-ai/rtk/master/Cargo.toml \
                  | awk -F\" '/^version/ {print $2; exit}')
          echo "rtk_version=$ver" >> "$GITHUB_OUTPUT"
          echo "Built rtk version: $ver"

      - name: Stage release assets
        id: stage
        shell: bash
        env:
          VER: ${{ steps.bump.outputs.version }}
          RTK_VER: ${{ steps.rtk.outputs.rtk_version }}
        run: |
          set -e
          mkdir -p release-assets
          cp bins/plugkit-win32-x64.exe/plugkit-win32-x64.exe     release-assets/
          cp bins/plugkit-win32-arm64.exe/plugkit-win32-arm64.exe release-assets/
          cp bins/plugkit-darwin-x64/plugkit-darwin-x64           release-assets/
          cp bins/plugkit-darwin-arm64/plugkit-darwin-arm64       release-assets/
          cp bins/plugkit-linux-x64/plugkit-linux-x64             release-assets/
          cp bins/plugkit-linux-arm64/plugkit-linux-arm64         release-assets/
          # rtk binaries built from source in our matrix — covers ALL targets including win-arm64
          cp bins/rtk-win32-x64.exe/rtk-win32-x64.exe         release-assets/
          cp bins/rtk-win32-arm64.exe/rtk-win32-arm64.exe     release-assets/
          cp bins/rtk-darwin-x64/rtk-darwin-x64               release-assets/
          cp bins/rtk-darwin-arm64/rtk-darwin-arm64           release-assets/
          cp bins/rtk-linux-x64/rtk-linux-x64                 release-assets/
          cp bins/rtk-linux-arm64/rtk-linux-arm64             release-assets/
          chmod +x release-assets/plugkit-darwin-* release-assets/plugkit-linux-* \
                   release-assets/rtk-darwin-* release-assets/rtk-linux-* 2>/dev/null || true
          cd release-assets
          # Portable sha256 manifests: "<hex>  <filename>" (no leading * for binary mode)
          sha256sum plugkit-win32-x64.exe plugkit-win32-arm64.exe \
                    plugkit-darwin-x64 plugkit-darwin-arm64 \
                    plugkit-linux-x64 plugkit-linux-arm64 \
            | sed 's/ \*/  /' > plugkit.sha256
          sha256sum rtk-win32-x64.exe rtk-win32-arm64.exe \
                    rtk-darwin-x64 rtk-darwin-arm64 \
                    rtk-linux-x64 rtk-linux-arm64 \
            | sed 's/ \*/  /' > rtk.sha256
          echo "$VER" > plugkit.version
          echo "$RTK_VER" > rtk.version
          ls -la
          cat plugkit.sha256
          cat rtk.sha256

      - name: Upload to plugkit-bin Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          if ! gh release view "v$VER" --repo AnEntrypoint/plugkit-bin >/dev/null 2>&1; then
            gh release create "v$VER" \
              --repo AnEntrypoint/plugkit-bin \
              --title "plugkit v$VER" \
              --notes "Auto-published by rs-plugkit CI from $GITHUB_SHA"
          fi
          # plugkit binaries (always present)
          gh release upload "v$VER" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            release-assets/plugkit-win32-x64.exe \
            release-assets/plugkit-win32-arm64.exe \
            release-assets/plugkit-darwin-x64 \
            release-assets/plugkit-darwin-arm64 \
            release-assets/plugkit-linux-x64 \
            release-assets/plugkit-linux-arm64 \
            release-assets/plugkit.sha256 \
            release-assets/plugkit.version
          # rtk binaries (built from source in the same matrix — every target covered)
          gh release upload "v$VER" \
            --repo AnEntrypoint/plugkit-bin \
            --clobber \
            release-assets/rtk-win32-x64.exe \
            release-assets/rtk-win32-arm64.exe \
            release-assets/rtk-darwin-x64 \
            release-assets/rtk-darwin-arm64 \
            release-assets/rtk-linux-x64 \
            release-assets/rtk-linux-arm64 \
            release-assets/rtk.sha256 \
            release-assets/rtk.version

      - name: Bump gm-starter metadata
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          git config --global user.name "rs-plugkit-bot"
          git config --global user.email "noreply@github.com"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AnEntrypoint/gm.git" gm-src
          cd gm-src
          # Always re-sync sha256 + version, even if plugkitVersion unchanged.
          # Windows MSVC builds are non-reproducible: a re-run of the same version
          # uploads new binaries (gh release upload --clobber) with new hashes,
          # so the manifest in gm-starter must always be re-synced or downstream
          # sha verification on Windows clients fails.
          jq --arg v "$VER" '.plugkitVersion = $v' gm-starter/gm.json > /tmp/gm.json
          mv /tmp/gm.json gm-starter/gm.json
          echo "$VER" > gm-starter/bin/plugkit.version
          # Sync sha256 manifest from the just-uploaded release (plugkit + rtk)
          cp ../release-assets/plugkit.sha256 gm-starter/bin/plugkit.sha256 2>/dev/null || \
            curl -sL "https://github.com/AnEntrypoint/plugkit-bin/releases/download/v${VER}/plugkit.sha256" -o gm-starter/bin/plugkit.sha256
          cp ../release-assets/rtk.sha256 gm-starter/bin/rtk.sha256 2>/dev/null || \
            curl -sL "https://github.com/AnEntrypoint/plugkit-bin/releases/download/v${VER}/rtk.sha256" -o gm-starter/bin/rtk.sha256
          cp ../release-assets/rtk.version gm-starter/bin/rtk.version 2>/dev/null || \
            curl -sL "https://github.com/AnEntrypoint/plugkit-bin/releases/download/v${VER}/rtk.version" -o gm-starter/bin/rtk.version
          git add gm-starter/gm.json gm-starter/bin/plugkit.version gm-starter/bin/plugkit.sha256 gm-starter/bin/rtk.sha256 gm-starter/bin/rtk.version
          if git diff --cached --quiet; then
            echo "No metadata changes"
            exit 0
          fi
          git commit -m "chore: bump plugkitVersion to $VER"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed metadata bump on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing"
            git pull --rebase origin main || true
          done
          echo "All push attempts exhausted" >&2
          exit 1
