name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: plugkit-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: plugkit-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: plugkit-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: plugkit-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: plugkit-win32-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: plugkit-win32-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/plugkit${ext}" "${{ matrix.asset_name }}"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish-binaries:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bins/

      - name: Checkout plugforge
        uses: actions/checkout@v4
        with:
          repository: AnEntrypoint/plugforge
          token: ${{ secrets.PUBLISHER_TOKEN }}
          path: plugforge

      - name: Copy binaries into plugforge
        shell: bash
        run: |
          mkdir -p plugforge/plugforge-starter/bin
          for d in bins/*/; do
            f=$(ls "$d")
            cp "$d$f" "plugforge/plugforge-starter/bin/$f"
          done
          cd plugforge/plugforge-starter/bin
          chmod +x plugkit-linux-x64 plugkit-linux-arm64 plugkit-darwin-x64 plugkit-darwin-arm64
          cp plugkit-win32-x64.exe plugkit.exe
          printf '#!/bin/sh\nDIR="$(cd "$(dirname "$0")" && pwd)"\ncase "$(uname -s)" in\n  Darwin) OS=darwin ;;\n  *)      OS=linux  ;;\nesac\ncase "$(uname -m)" in\n  arm64|aarch64) ARCH=arm64 ;;\n  *)             ARCH=x64   ;;\nesac\nexec "$DIR/plugkit-$OS-$ARCH" "$@"\n' > plugkit
          chmod +x plugkit
          ls -la

      - name: Squash-commit binaries to plugforge
        shell: bash
        working-directory: plugforge
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config user.name "plugforge-bot"
          git config user.email "noreply@github.com"
          git config url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git fetch origin main
          git checkout main
          git add plugforge-starter/bin/
          if git diff --cached --quiet; then
            echo "No binary changes"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          FIRST_BIN=$(git log --oneline --grep="^chore: update plugkit binaries" --format="%H" | tail -1)
          if [ -n "$FIRST_BIN" ]; then
            PARENT=$(git rev-parse "${FIRST_BIN}^")
            git reset --soft "$PARENT"
            git add plugforge-starter/bin/
          fi
          git commit -m "chore: update plugkit binaries to $TAG [skip ci]"
          git push origin main --force-with-lease
