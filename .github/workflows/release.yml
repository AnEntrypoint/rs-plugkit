name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: plugkit-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: plugkit-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: plugkit-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: plugkit-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: plugkit-win32-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: plugkit-win32-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/plugkit"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.asset_name }}"
          ls -la "${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
