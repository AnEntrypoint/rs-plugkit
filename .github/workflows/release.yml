name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: plugkit-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: plugkit-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: plugkit-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: plugkit-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: plugkit-win32-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: plugkit-win32-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/plugkit

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple')
        run: strip target/${{ matrix.target }}/release/plugkit

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then ext=".exe"; fi
          cp "target/${{ matrix.target }}/release/plugkit${ext}" "${{ matrix.asset_name }}"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish-binaries:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bins/

      - name: Checkout plugforge
        uses: actions/checkout@v4
        with:
          repository: AnEntrypoint/plugforge
          token: ${{ secrets.PUBLISHER_TOKEN }}
          path: plugforge
          fetch-depth: 0

      - name: Copy binaries into plugforge
        shell: bash
        run: |
          for target in plugforge/gm-build-latest/gm-cc/bin plugforge/plugforge-starter/bin; do
            mkdir -p "$target"
            for d in bins/*/; do
              f=$(ls "$d")
              cp "$d$f" "$target/$f"
            done
            chmod +x "$target/plugkit-linux-x64" "$target/plugkit-linux-arm64" "$target/plugkit-darwin-x64" "$target/plugkit-darwin-arm64" 2>/dev/null || true
            cp "$target/plugkit-win32-x64.exe" "$target/plugkit.exe" 2>/dev/null || true
          done
          ls -la plugforge/gm-build-latest/gm-cc/bin

      - name: Checkout rs-plugkit for version
        uses: actions/checkout@v4
        with:
          path: rs-plugkit-src

      - name: Update plugkitVersion in gm.json
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ] || [ "$TAG" = "$VERSION" ]; then
            VERSION=$(grep '^version' rs-plugkit-src/Cargo.toml | head -1 | sed 's/.*= *"//;s/"//')
          fi
          if [ -n "$VERSION" ]; then
            node -e "
              const fs = require('fs');
              const p = 'plugforge/plugforge-starter/gm.json';
              const j = JSON.parse(fs.readFileSync(p,'utf8'));
              j.plugkitVersion = '$VERSION';
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
              console.log('plugkitVersion set to', '$VERSION');
            "
          fi

      - name: Squash-commit binaries to plugforge
        shell: bash
        working-directory: plugforge
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config user.name "plugforge-bot"
          git config user.email "noreply@github.com"
          git config url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git add gm-build-latest/gm-cc/bin/ plugforge-starter/bin/ plugforge-starter/gm.json
          if git diff --cached --quiet; then
            echo "No binary changes"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          git commit -m "chore: update plugkit binaries to $TAG [skip ci]"
          git push origin main
